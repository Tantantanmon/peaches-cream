<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Peaches & Cream</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#dde4ed; --surface:#e8eef5; --card:#ffffff;
  --card-border:rgba(160,180,210,0.25); --text-primary:#1a2840;
  --text-secondary:#5a7090; --text-muted:#a0adc0;
  --accent:#1e293e; --divider:rgba(160,180,210,0.15);
  --shadow:0 4px 12px rgba(160,180,210,0.1); --radius-lg:24px; --radius-md:16px;
}
html,body{
  width:100%; height:100%; background:#f0f2f5; 
  font-family:'Pretendard', sans-serif; font-size: 15px; /* 폰트 1px 축소 */
}
.shell{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.popup{
  width: 390px; height: 844px; /* 앱 사이즈 고정 */
  max-width: 100%; max-height: 95vh;
  background:var(--surface); border-radius:var(--radius-lg);
  overflow:hidden; box-shadow:0 20px 50px rgba(140,160,200,0.3);
  display:flex; flex-direction:column;
}
.topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; flex-shrink:0;}
.topbar-title{font-size:21px; font-weight:700; color:var(--text-primary);}
.scroll-area{flex:1; overflow-y:auto; padding:16px;}
.app-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.app-card{background:var(--card); border-radius:var(--radius-md); padding:20px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; box-shadow:var(--shadow);}
.flag-card{
  background:var(--card); border-radius:20px; border:0.5px solid var(--card-border);
  padding:30px 20px; display:flex; flex-direction:column; align-items:center; gap:12px;
  box-shadow:var(--shadow); margin-bottom:16px;
}
.flag-text{font-size:18px; font-weight:600; text-align:center; line-height:1.5;}
.choice-row{display:flex; gap:12px; justify-content:center; margin-bottom:16px;}
.cbtn{
  width: 70px; height: 55px; /* 사이즈 적절히 축소 */
  border-radius:var(--radius-md); background:var(--card); 
  border:0.5px solid var(--card-border); cursor:pointer;
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);
}
.char-reply{
  border-radius:var(--radius-md); background:var(--card); /* 반응칸 흰색 */
  border:0.5px solid var(--card-border); box-shadow:var(--shadow);
  display:none; margin-bottom:16px; overflow:hidden;
}
.char-header{display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:0.5px solid var(--divider);}
.char-avatar{width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600;}
.char-body{padding:14px 16px; font-size:14px; color:var(--text-secondary); line-height:1.7;}
.lt-item{
  background:var(--card); border-radius:var(--radius-md); /* 노란색 배경 제거 */
  border:0.5px solid var(--card-border); padding:14px; 
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:var(--shadow); margin-bottom:8px;
}
.lt-dot{width:8px; height:8px; border-radius:50%; background:#e8a030; margin-right:8px;}
.lt-title{font-size:14px; font-weight:500; flex:1;}
.back-btn{border:none; background:none; color:var(--text-muted); cursor:pointer; font-size:15px;}
</style>
</head>
<body>
<div class="shell">
  <div class="popup">
    <div class="topbar"><div id="top-left"><span class="topbar-title">🍑 Peaches & Cream</span></div><div style="color:var(--text-muted)">✕</div></div>
    <div class="scroll-area">
      <div id="screen-home"><div class="app-grid">
        <div class="app-card" onclick="goTo('redflag')">🚩<br>Red Flag</div>
        <div class="app-card" onclick="goTo('lasttouch')">🕒<br>Last Touch</div>
      </div></div>
      <div id="screen-redflag" style="display:none;">
        <div class="flag-card"><div style="font-size:12px; color:var(--text-muted);">Q 1 / 7</div><div class="flag-text">네가 싫다고 한 걸 다음엔 더 천천히 다시 시도한다</div></div>
        <div class="choice-row" id="rf-choices"><button class="cbtn" onclick="rfChoose('red')">🚩</button><button class="cbtn" onclick="rfChoose('good')">😍</button></div>
        <div class="char-reply" id="rf-reply"><div class="char-header"><div class="char-avatar">M</div><strong>Max</strong></div><div class="char-body" id="rf-msg"></div></div>
        <button id="rf-next" style="display:none; width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:10px;" onclick="goTo('home')">다음 카드 →</button>
      </div>
      <div id="screen-lasttouch" style="display:none;"><div class="lt-item"><div class="lt-dot"></div><span class="lt-title">서툰 키스가 부른 한밤중의 자위</span><span>2024.05.24</span></div></div>
    </div>
  </div>
</div>
<script>
function goTo(s) {
  document.getElementById('screen-home').style.display = s==='home'?'block':'none';
  document.getElementById('screen-redflag').style.display = s==='redflag'?'block':'none';
  document.getElementById('screen-lasttouch').style.display = s==='lasttouch'?'block':'none';
  document.getElementById('top-left').innerHTML = s==='home' ? '<span class="topbar-title">🍑 Peaches & Cream</span>' : `<button class="back-btn" onclick="goTo('home')">← BACK</button>`;
}
function rfChoose(t) {
  document.getElementById('rf-choices').style.display = 'none';
  document.getElementById('rf-reply').style.display = 'block';
  document.getElementById('rf-next').style.display = 'block';
  document.getElementById('rf-msg').innerText = t==='red' ? "싫다고 했지만 네 몸은 내 손길을 더 원하고 있잖아." : "역시 넌 이런 걸 즐길 줄 알았어. 더 천천히 느껴봐.";
}
</script>
</body>
</html>
