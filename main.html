<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Peaches & Cream</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#dde4ed;
  --surface:#e8eef5;
  --card:#f2f6fa;
  --card-border:rgba(255,255,255,0.95);
  --text-primary:#1a2840;
  --text-secondary:#5a7090;
  --text-muted:#a0adc0;
  --accent:#1e293e;
  --accent-text:#fff;
  --divider:rgba(160,180,210,0.25);
  --btn-select:#1e293e;
  --btn-select-text:#fff;
  --btn-idle:#e4ecf4;
  --btn-idle-text:#5a7090;
  --shadow:0 2px 8px rgba(160,180,210,0.15);
  --radius-lg:24px;
  --radius-md:16px;
  --radius-sm:10px;
  --radius-btn:8px;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;}

/* ── 스크롤 ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(160,180,210,0.35);border-radius:4px;}

/* ── 레이아웃 ── */
.shell{
  width:100%;height:100%;
  display:flex;align-items:stretch;justify-content:center;
  padding:0;
}
.popup{
  width:100%;max-width:100%;
  height:100%;max-height:100%;
  background:var(--surface);
  border-radius:var(--radius-lg);
  border:0.5px solid rgba(255,255,255,0.9);
  overflow:hidden;
  box-shadow:0 12px 40px rgba(140,160,200,0.3);
  display:flex;flex-direction:column;
}

/* ── 모바일 ── */
@media(max-width:600px){
  .shell{padding:0;align-items:flex-end;}
  .popup{max-width:100%;max-height:95vh;border-radius:24px 24px 0 0;}
}

/* ── 탑바 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;flex-shrink:0;
}
.topbar-title{font-size:18px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px;}
.topbar-sub{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
.close-btn{
  width:40px;height:40px;border-radius:12px;
  background:var(--card);border:0.5px solid var(--card-border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-secondary);font-size:16px;
  box-shadow:var(--shadow);transition:opacity .15s;
}
.close-btn:hover{opacity:.7;}
.back-btn{
  display:flex;align-items:center;gap:5px;
  font-size:13px;color:var(--text-muted);cursor:pointer;
  padding:4px 0;transition:color .15s;
}
.back-btn:hover{color:var(--text-secondary);}
.back-btn svg{width:14px;height:14px;}
.dots{display:flex;gap:4px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text-muted);opacity:.5;}

.hdivider{height:0.5px;background:var(--divider);flex-shrink:0;}

/* ── 스크롤 영역 ── */
.scroll-area{flex:1;overflow-y:auto;padding:18px 20px 28px;}

/* ══════════════════════════════
   HOME
══════════════════════════════ */
.section-label{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.app-card{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);
  padding:20px 16px 18px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
}
.app-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(140,160,200,0.22);}
.app-card:active{transform:translateY(0);}
.app-icon{
  width:60px;height:60px;border-radius:16px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);
}
.app-icon svg{width:26px;height:26px;}
.app-name{font-size:14px;font-weight:500;color:var(--text-primary);}

/* ══════════════════════════════
   LAST TOUCH
══════════════════════════════ */
.lt-counter{font-size:11px;color:var(--text-muted);}
.lt-list{display:flex;flex-direction:column;gap:8px;}
.lt-item{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s;
}
.lt-item.active{border-color:#e8a030;background:#fdf8f0;}
.lt-item-left{display:flex;align-items:center;gap:10px;}
.lt-dot{width:8px;height:8px;border-radius:50%;background:var(--divider);flex-shrink:0;}
.lt-item.active .lt-dot{background:#e8a030;}
.lt-item-title{font-size:14px;font-weight:500;color:var(--text-primary);}
.lt-item-date{font-size:11px;color:var(--text-muted);}
.lt-item-right{display:flex;align-items:center;gap:8px;}
.lt-menu-btn{
  width:28px;height:28px;border-radius:8px;
  background:var(--surface);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);font-size:13px;
  position:relative;
}
.lt-dropdown{
  position:absolute;right:0;top:32px;z-index:10;
  background:var(--card);border-radius:10px;
  border:0.5px solid var(--card-border);
  box-shadow:0 8px 24px rgba(140,160,200,0.25);
  overflow:hidden;min-width:110px;display:none;
}
.lt-dropdown.open{display:block;}
.lt-dd-item{
  padding:9px 14px;font-size:12px;color:var(--text-secondary);
  cursor:pointer;white-space:nowrap;
}
.lt-dd-item:hover{background:var(--surface);}
.lt-dd-item.danger{color:#c04030;}

.ai-btn{
  width:100%;background:var(--card);border:0.5px solid var(--card-border);
  border-radius:var(--radius-md);padding:14px;
  font-size:13px;font-weight:500;color:var(--text-secondary);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:var(--shadow);margin-top:10px;transition:opacity .15s;
}
.ai-btn:hover{opacity:.8;}
.ai-btn svg{width:15px;height:15px;}
.ai-btn.loading{opacity:.6;pointer-events:none;}

/* ── Last Touch 카드 팝업 ── */
.card-overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(180,195,215,0.6);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.touch-card{
  width:100%;max-width:400px;max-height:80vh;
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);
  box-shadow:0 12px 36px rgba(130,155,195,0.3);
  overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}
.tc-top-bar{height:4px;background:linear-gradient(90deg,#e05040,#e07030);flex-shrink:0;}
.tc-body{padding:20px 20px 16px;overflow-y:auto;flex:1;}
.tc-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.tc-meta{font-size:12px;color:var(--text-muted);margin-bottom:14px;}
.tc-tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tc-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;}
.tc-tag.mood{background:#f5ead0;color:#8a6020;border:0.5px solid rgba(200,150,40,0.2);}
.tc-tag.pos{background:var(--surface);color:var(--text-secondary);border:0.5px solid var(--divider);}
.tc-section-label{font-size:9px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin:14px 0 8px;}
.tc-review{
  background:var(--surface);border-radius:10px;
  padding:12px 14px;font-size:13px;color:var(--text-secondary);line-height:1.8;
}
.tc-genital{
  background:var(--surface);border-radius:10px;
  padding:12px 14px;margin-top:8px;
}
.tc-gen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tc-gen-emoji{font-size:16px;}
.tc-condom-badge{
  padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;
  background:rgba(200,60,40,0.1);border:0.5px solid rgba(200,60,40,0.2);color:#a03020;
}
.tc-condom-badge.safe{background:rgba(50,140,70,0.1);border-color:rgba(50,140,70,0.2);color:#307040;}
.tc-gen-text{font-size:13px;color:var(--text-secondary);line-height:1.7;}
.tc-gen-ko{font-size:11px;color:var(--text-muted);margin-top:5px;line-height:1.6;}
.tc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 16px;flex-shrink:0;
  border-top:0.5px solid var(--divider);
}
.tc-pin-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:var(--text-muted);cursor:pointer;
  background:none;border:none;padding:0;transition:color .15s;
}
.tc-pin-btn.pinned{color:#e8a030;}
.tc-pin-btn svg{width:13px;height:13px;}
.tc-date{font-size:11px;color:var(--text-muted);}
.tc-close{
  position:absolute;top:12px;right:12px;
  width:28px;height:28px;border-radius:8px;
  background:var(--surface);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:14px;
}

/* ══════════════════════════════
   MY PROFILE
══════════════════════════════ */
.profile-section{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);
  padding:16px 18px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:14px;
  margin-bottom:10px;
}
.ps-label{font-size:9px;font-weight:600;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:2px;}
.ps-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ps-row-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);min-width:80px;flex-shrink:0;}
.ps-row-label svg{width:14px;height:14px;color:var(--text-muted);}
.ps-input-wrap{display:flex;align-items:center;gap:4px;}
.ps-input{
  width:72px;padding:5px 8px;border-radius:8px;
  border:0.5px solid var(--divider);
  background:var(--surface);color:var(--text-primary);
  font-size:13px;text-align:right;outline:none;
}
.ps-input:focus{border-color:rgba(100,140,200,0.4);}
.ps-unit{font-size:11px;color:var(--text-muted);}
.ps-text-input{
  flex:1;padding:5px 10px;border-radius:8px;
  border:0.5px solid var(--divider);
  background:var(--surface);color:var(--text-primary);
  font-size:13px;outline:none;
}
.ps-text-input:focus{border-color:rgba(100,140,200,0.4);}
.btn-group{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.pg-btn{
  padding:5px 11px;border-radius:7px;font-size:11px;font-weight:500;
  background:var(--btn-idle);color:var(--btn-idle-text);
  border:0.5px solid rgba(160,190,220,0.3);
  cursor:pointer;transition:all .12s;
}
.pg-btn.sel{background:var(--btn-select);color:var(--btn-select-text);border-color:transparent;}
.pg-btn:hover:not(.sel){background:#dce6f0;}

/* 민감 부위 태그 */
.sensitive-wrap{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;}
.sens-tag{
  padding:4px 10px;border-radius:20px;font-size:11px;
  background:var(--btn-idle);color:var(--btn-idle-text);
  border:0.5px solid rgba(160,190,220,0.3);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px;
}
.sens-tag.sel{background:var(--btn-select);color:var(--btn-select-text);}
.sens-add{
  padding:4px 10px;border-radius:20px;font-size:11px;
  background:transparent;color:var(--text-muted);
  border:0.5px dashed rgba(160,190,220,0.5);cursor:pointer;
}

/* 저장 버튼 */
.save-row{display:flex;gap:8px;margin-top:4px;}
.save-btn{
  flex:1;background:var(--accent);color:var(--accent-text);
  border:none;border-radius:var(--radius-sm);padding:13px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:opacity .15s;
}
.save-btn:hover{opacity:.85;}
.save-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;
  padding:8px 20px;border-radius:20px;font-size:12px;font-weight:500;
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:50;
}
.save-toast.show{opacity:1;}

/* ══════════════════════════════
   CLINIC
══════════════════════════════ */
.data-card{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);box-shadow:var(--shadow);
  padding:12px 16px;
}
.data-label{font-size:9px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.data-tags{display:flex;flex-wrap:wrap;gap:5px;}
.dtag{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:500;}
.dtag.w{background:rgba(200,80,60,0.1);border:0.5px solid rgba(200,80,60,0.2);color:#a04030;}
.dtag.g{background:rgba(60,140,80,0.08);border:0.5px solid rgba(60,140,80,0.18);color:#3a7050;}
.dtag.n{background:var(--surface);border:0.5px solid var(--divider);color:var(--text-secondary);}

.input-card{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);box-shadow:var(--shadow);
  padding:14px 16px;display:flex;flex-direction:column;gap:10px;
}
.input-lbl{font-size:11px;color:var(--text-muted);}
.q-input{
  width:100%;background:var(--surface);
  border:0.5px solid rgba(160,190,220,0.3);
  border-radius:var(--radius-sm);padding:11px 13px;
  font-size:13px;color:var(--text-primary);
  outline:none;font-family:inherit;resize:none;min-height:68px;line-height:1.6;
}
.q-input::placeholder{color:var(--text-muted);}
.eq-row{display:flex;flex-wrap:wrap;gap:5px;}
.eq{
  padding:5px 11px;border-radius:20px;font-size:11px;
  background:var(--surface);border:0.5px solid var(--divider);
  color:var(--text-secondary);cursor:pointer;transition:background .12s;
}
.eq:hover{background:#dce6f0;}
.ask-btn{
  width:100%;background:var(--accent);border:none;
  border-radius:var(--radius-sm);padding:13px;
  font-size:13px;font-weight:600;color:#fff;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s;
}
.ask-btn:hover{opacity:.85;}
.ask-btn svg{width:13px;height:13px;}
.ask-btn:disabled{opacity:.5;pointer-events:none;}

.answers{display:flex;flex-direction:column;gap:10px;margin-top:2px;}
.ans-card{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);overflow:hidden;
}
.ans-card.dark{background:#12161f;border-color:rgba(255,255,255,0.06);}
.ans-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px 10px;
  border-bottom:0.5px solid var(--divider);
}
.ans-card.dark .ans-header{border-bottom-color:rgba(255,255,255,0.07);}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.av.doc{background:#e8f0f8;border:0.5px solid rgba(100,140,200,0.2);}
.av.ch{background:rgba(255,255,255,0.07);font-size:12px;font-weight:700;color:#8090a8;}
.ans-name{font-size:13px;font-weight:600;color:var(--text-primary);}
.ans-card.dark .ans-name{color:#d0dae8;}
.ans-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ans-card.dark .ans-sub{color:#3a4a62;}
.ans-body{padding:13px 16px 15px;}
.warn-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(200,80,60,0.1);border:0.5px solid rgba(200,80,60,0.2);
  border-radius:6px;padding:3px 8px;
  font-size:10px;font-weight:600;color:#a04030;margin-bottom:8px;
}
.ans-text{font-size:13px;color:var(--text-primary);line-height:1.9;}
.ans-text.light{color:#c0ccd8;}
.loading-card{
  background:var(--card);border-radius:var(--radius-md);
  border:0.5px solid var(--card-border);
  padding:18px 16px;display:flex;align-items:center;gap:10px;
}
.sp{width:14px;height:14px;border:1.5px solid var(--divider);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--text-muted);}

/* ══════════════════════════════
   PRIVATE VAULT
══════════════════════════════ */
.vault-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px 20px;text-align:center;
}
.vault-icon{
  width:64px;height:64px;border-radius:18px;
  background:var(--card);border:0.5px solid var(--card-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);
}
.vault-icon svg{width:28px;height:28px;}
.vault-title{font-size:15px;font-weight:600;color:var(--text-secondary);}
.vault-desc{font-size:12px;color:var(--text-muted);line-height:1.7;max-width:240px;}
</style>
</head>
<body>
<div class="shell">
<div class="popup" id="popup">

  <!-- ══ TOPBAR ══ -->
  <div class="topbar" id="topbar">
    <div id="topbar-left">
      <span class="topbar-title">🍑 Peaches &amp; Cream</span>
    </div>
    <div id="topbar-right">
      <div class="close-btn" onclick="closeApp()">✕</div>
    </div>
  </div>
  <div class="hdivider"></div>

  <!-- ══ 스크롤 영역 ══ -->
  <div class="scroll-area" id="scroll-area">

    <!-- ── HOME ── -->
    <div id="screen-home">
      <div class="section-label">APPS</div>
      <div class="app-grid">
        <div class="app-card" onclick="goTo('lasttouch')">
          <div class="app-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <span class="app-name">Last Touch</span>
        </div>
        <div class="app-card" onclick="goTo('profile')">
          <div class="app-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="app-name">My Profile</span>
        </div>
        <div class="app-card" onclick="goTo('clinic')">
          <div class="app-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <span class="app-name">Clinic</span>
        </div>
        <div class="app-card" onclick="goTo('vault')">
          <div class="app-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <span class="app-name">Private Vault</span>
        </div>
      </div>
    </div>

    <!-- ── LAST TOUCH ── -->
    <div id="screen-lasttouch" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <span class="section-label" style="margin:0;">기록</span>
        <span class="lt-counter" id="lt-counter">0 / 0</span>
      </div>
      <div class="lt-list" id="lt-list"></div>
      <button class="ai-btn" id="lt-ai-btn" onclick="ltAIFetch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2l-19 19"/><path d="M21.5 2H8.5"/><path d="M21.5 2v13"/></svg>
        AI 불러오기
      </button>

<script>
// ─────────────────────────────────────────────
// Bridge — index.js에서 주입된 값 읽기
// iframe load 후 index.js가 __PC_ON_BRIDGE__를 호출해서 초기화
// ─────────────────────────────────────────────
let store    = { config:{}, profile:{}, lastTouch:{ cards:[], pinned:[] } };
let charName = '{{char}}';
let generate = null;
let getChat  = null;

// iframe 안에서 parent의 데이터를 읽어옴
function syncStore() {
  if (window.parent && window.parent.__PC_STORE__) store = window.parent.__PC_STORE__;
}

function initBridge() {
  const p = window.parent;
  store    = (p && p.__PC_STORE__)    || store;
  charName = (p && p.__PC_CHAR__)     || charName;
  generate = (p && p.__PC_GENERATE__) || null;
  getChat  = (p && p.__PC_GET_CHAT__) || null;
  console.log('[PC] bridge initialized, char:', charName);
}

// index.js가 iframe.contentWindow.__PC_ON_BRIDGE__() 를 호출
// → 여기 window (iframe) 에 등록해야 함
window.__PC_ON_BRIDGE__ = function() {
  initBridge();
};

// 이미 주입된 경우 즉시 초기화
if (window.parent && window.parent.__PC_STORE__) initBridge();

// ─────────────────────────────────────────────
// 화면 라우터
// ─────────────────────────────────────────────
let currentScreen = 'home';
const screens = ['home','lasttouch','profile','clinic','vault'];

function goTo(id) {
  screens.forEach(s => {
    document.getElementById('screen-' + s).style.display = 'none';
  });
  document.getElementById('screen-' + id).style.display = (id === 'clinic') ? 'flex' : 'block';
  currentScreen = id;
  updateTopbar(id);
  document.getElementById('scroll-area').scrollTop = 0;

  if (id === 'lasttouch') renderLTList();
  if (id === 'profile')   loadProfile();
  if (id === 'clinic')    loadClinicTags();
}

function updateTopbar(id) {
  const left  = document.getElementById('topbar-left');
  const right = document.getElementById('topbar-right');
  const labels = {
    home:      '',
    lasttouch: 'LAST TOUCH',
    profile:   'MY PROFILE',
    clinic:    'CLINIC',
    vault:     'PRIVATE VAULT',
  };

  if (id === 'home') {
    left.innerHTML  = '<span class="topbar-title">🍑 Peaches &amp; Cream</span>';
    right.innerHTML = '<div class="close-btn" onclick="closeApp()">✕</div>';
  } else {
    left.innerHTML  = `<div class="back-btn" onclick="goTo('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Home</div>`;
    right.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><span class="topbar-sub">${labels[id]}</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  }
}

function closeApp() {
  if (window.parent.__PC_CLOSE__) window.parent.__PC_CLOSE__();
  else window.close();
}

// ─────────────────────────────────────────────
// LAST TOUCH
// ─────────────────────────────────────────────
let ltActiveCard = null;

function renderLTList() {
  syncStore();
  const cards  = store.lastTouch.cards  || [];
  const pinned = store.lastTouch.pinned || [];
  const total  = cards.length;
  document.getElementById('lt-counter').textContent = total + ' / 5';

  const list = document.getElementById('lt-list');
  if (total === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0;">아직 기록이 없어요</div>';
    return;
  }

  list.innerHTML = cards.map((c, i) => {
    const isPinned = pinned.includes(c.id);
    return `
      <div class="lt-item${i === 0 ? ' active' : ''}" id="lt-item-${c.id}" onclick="ltOpenCard('${c.id}')">
        <div class="lt-item-left">
          <div class="lt-dot"></div>
          <span class="lt-item-title">${esc(c.title)}</span>
        </div>
        <div class="lt-item-right">
          <span class="lt-item-date">${esc(c.date)}</span>
          <div class="lt-menu-btn" onclick="ltMenuToggle(event,'${c.id}')">
            ⋮
            <div class="lt-dropdown" id="ltdd-${c.id}">
              <div class="lt-dd-item" onclick="ltTogglePin('${c.id}',event)">${isPinned ? '📌 핀 해제' : '📌 핀'}</div>
              <div class="lt-dd-item danger" onclick="ltDelete('${c.id}',event)">🗑 삭제</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function ltMenuToggle(e, id) {
  e.stopPropagation();
  document.querySelectorAll('.lt-dropdown').forEach(d => {
    if (d.id !== 'ltdd-' + id) d.classList.remove('open');
  });
  document.getElementById('ltdd-' + id).classList.toggle('open');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.lt-dropdown').forEach(d => d.classList.remove('open'));
});

function ltOpenCard(id) {
  syncStore();
  const card = store.lastTouch.cards.find(c => c.id === id);
  if (!card) return;
  ltActiveCard = card;

  const pinned  = store.lastTouch.pinned || [];
  const isPinned = pinned.includes(id);

  const body = document.getElementById('tc-body');
  body.innerHTML = `
    <div class="tc-title">${esc(card.title)}</div>
    <div class="tc-meta">${esc(card.date || '')}${card.place ? ' · ' + esc(card.place) : ''}</div>
    <div class="tc-tag-row">
      ${card.mood ? `<span class="tc-tag mood">${esc(card.mood)}</span>` : ''}
      ${(card.positions || []).map(p => `<span class="tc-tag pos">${esc(p)}</span>`).join('')}
    </div>
    <div class="tc-section-label">{{CHAR}}'S REVIEW</div>
    <div class="tc-review">${esc(card.charReview || '-')}</div>
    ${card.genitalComment ? `
      <div class="tc-genital">
        <div class="tc-gen-header">
          <span class="tc-gen-emoji">🍆</span>
          <span class="tc-condom-badge ${card.condom ? 'safe' : ''}">${card.condom ? 'CONDOM' : 'NO CONDOM'}</span>
        </div>
        <div class="tc-gen-text">${esc(card.genitalComment)}</div>
        ${card.genitalCommentKo ? `<div class="tc-gen-ko">${esc(card.genitalCommentKo)}</div>` : ''}
      </div>` : ''}
  `.replace(/\{\{CHAR\}\}/g, charName);

  document.getElementById('tc-date').textContent = card.date || '';
  const pinBtn = document.getElementById('tc-pin-btn');
  pinBtn.className = 'tc-pin-btn' + (isPinned ? ' pinned' : '');

  document.getElementById('lt-card-overlay').style.display = 'flex';
}

function ltCloseCard(e) {
  if (e.target === document.getElementById('lt-card-overlay')) ltCloseCardDirect();
}
function ltCloseCardDirect() {
  document.getElementById('lt-card-overlay').style.display = 'none';
  ltActiveCard = null;
}

function ltTogglePin(id, e) {
  if (e) e.stopPropagation();
  const targetId = id || (ltActiveCard && ltActiveCard.id);
  if (!targetId) return;
  // parent store에 반영
  if (window.parent.__PC_STORE__) {
    const pinned = window.parent.__PC_STORE__.lastTouch.pinned;
    const idx    = pinned.indexOf(targetId);
    if (idx >= 0) pinned.splice(idx, 1);
    else pinned.push(targetId);
    if (window.parent.__PC_SAVE__) window.parent.__PC_SAVE__();
  }
  renderLTList();
  if (ltActiveCard) ltOpenCard(ltActiveCard.id);
}

function ltDelete(id, e) {
  if (e) e.stopPropagation();
  if (window.parent.__PC_STORE__) {
    window.parent.__PC_STORE__.lastTouch.cards  = window.parent.__PC_STORE__.lastTouch.cards.filter(c => c.id !== id);
    window.parent.__PC_STORE__.lastTouch.pinned = window.parent.__PC_STORE__.lastTouch.pinned.filter(p => p !== id);
    if (window.parent.__PC_SAVE__) window.parent.__PC_SAVE__();
  }
  renderLTList();
}

async function ltAIFetch() {
  if (!generate || !getChat) {
    alert('ST와 연결되지 않았어요.');
    return;
  }
  const btn = document.getElementById('lt-ai-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="sp"></div> 분석 중...';

  try {
    const messages = getChat(20);
    const chatText = messages.map(m => `[${m.name || m.role}]: ${m.content}`).join('\n');

    // NSFW 감지 + 카드 생성 프롬프트
    const systemPrompt = `You are an analyst for a sexual roleplay chat logger.
Analyze the provided chat log and extract sexual encounter records.
For each distinct sexual encounter found, output a JSON object.
Return ONLY a JSON array (no markdown, no explanation).
Each object must have:
- id: unique string (timestamp-based)
- title: short evocative Korean title for the encounter
- date: today's date as YYYY.MM.DD
- place: location if mentioned, else null
- mood: atmosphere/mood in Korean (e.g. "앵그리 섹스")
- positions: array of up to 3 sex positions mentioned (Korean or English)
- charReview: 4-sentence explicit review from {{char}}'s perspective in Korean
- genitalComment: explicit comment about genitals in English
- genitalCommentKo: Korean translation of genitalComment
- condom: boolean (true if condom used, false if not)
If no sexual content found, return empty array [].
Maximum 5 records. Most recent first.`;

    const result = await generate(systemPrompt, `Chat log:\n${chatText}`);
    let cards = [];
    try {
      const clean = result.replace(/```json|```/g, '').trim();
      cards = JSON.parse(clean);
    } catch(e) {
      console.warn('[PC] JSON parse error', e, result);
    }

    if (!Array.isArray(cards) || cards.length === 0) {
      btn.classList.remove('loading');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2l-19 19"/><path d="M21.5 2H8.5"/><path d="M21.5 2v13"/></svg> AI 불러오기';
      alert('NSFW 내용을 찾지 못했어요.');
      return;
    }

    // store에 저장
    if (window.parent.__PC_STORE__) {
      const existing = window.parent.__PC_STORE__.lastTouch.cards;
      const pinnedIds = window.parent.__PC_STORE__.lastTouch.pinned;
      const pinnedCards   = existing.filter(c => pinnedIds.includes(c.id));
      const newCards      = [...cards, ...pinnedCards].slice(0, 5);
      window.parent.__PC_STORE__.lastTouch.cards = newCards;
      if (window.parent.__PC_SAVE__) window.parent.__PC_SAVE__();
    }
    renderLTList();
  } catch(err) {
    console.error('[PC] ltAIFetch error', err);
    alert('AI 호출 중 오류가 발생했어요.');
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2l-19 19"/><path d="M21.5 2H8.5"/><path d="M21.5 2v13"/></svg> AI 불러오기';
}

// ─────────────────────────────────────────────
// MY PROFILE
// ─────────────────────────────────────────────
const DEFAULT_SENSITIVE = ['목','귀','허벅지'];
let sensitiveParts = [];

function loadProfile() {
  syncStore();
  const p = store.profile || {};

  // 텍스트 입력
  document.getElementById('p-height').value = p.height || '';
  document.getElementById('p-weight').value = p.weight || '';
  document.getElementById('p-eye').value    = p.eyeColor || '';
  document.getElementById('p-hair').value   = p.hair    || '';

  // 버튼 그룹
  ['skinTone','bodyType','chest','butt','waistHip','skinTexture','bodyHair','bodyScent','moanType'].forEach(key => {
    const group = document.getElementById('bg-' + key);
    if (!group) return;
    group.querySelectorAll('.pg-btn').forEach(btn => {
      btn.classList.toggle('sel', btn.dataset.val === p[key]);
    });
    group.addEventListener('click', e => {
      const btn = e.target.closest('.pg-btn');
      if (!btn) return;
      group.querySelectorAll('.pg-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });

  // 민감 부위
  sensitiveParts = [...(p.sensitiveParts || DEFAULT_SENSITIVE)];
  renderSensitive();
}

function renderSensitive() {
  const wrap = document.getElementById('sensitive-wrap');
  wrap.innerHTML = sensitiveParts.map(s => `
    <div class="sens-tag sel" onclick="sensRemove('${s}')">${esc(s)} ×</div>
  `).join('') + `<div class="sens-add" onclick="sensAdd()">+ 추가</div>`;
}

function sensRemove(val) {
  sensitiveParts = sensitiveParts.filter(s => s !== val);
  renderSensitive();
}

function sensAdd() {
  const val = prompt('민감 부위 추가 (예: 쇄골)');
  if (val && val.trim() && !sensitiveParts.includes(val.trim())) {
    sensitiveParts.push(val.trim());
    renderSensitive();
  }
}

function saveProfile() {
  const profile = {
    height:       document.getElementById('p-height').value,
    weight:       document.getElementById('p-weight').value,
    eyeColor:     document.getElementById('p-eye').value,
    hair:         document.getElementById('p-hair').value,
    skinTone:     getSelected('bg-skinTone'),
    bodyType:     getSelected('bg-bodyType'),
    chest:        getSelected('bg-chest'),
    butt:         getSelected('bg-butt'),
    waistHip:     getSelected('bg-waistHip'),
    skinTexture:  getSelected('bg-skinTexture'),
    bodyHair:     getSelected('bg-bodyHair'),
    sensitiveParts: [...sensitiveParts],
    bodyScent:    getSelected('bg-bodyScent'),
    moanType:     getSelected('bg-moanType'),
  };

  if (window.parent.__PC_STORE__) {
    window.parent.__PC_STORE__.profile = { ...(window.parent.__PC_STORE__.profile || {}), ...profile };
    if (window.parent.__PC_SAVE__) window.parent.__PC_SAVE__();
    // 프롬프트 갱신
    if (window.parent.__PC_REFRESH_PROMPT__) window.parent.__PC_REFRESH_PROMPT__();
  }

  showToast('저장됐어요 ✓');
}

function getSelected(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return '';
  const sel = group.querySelector('.pg-btn.sel');
  return sel ? sel.dataset.val : '';
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
// CLINIC
// ─────────────────────────────────────────────
function loadClinicTags() {
  syncStore();
  const tags    = [];
  const cards   = store.lastTouch.cards  || [];
  const profile = store.profile          || {};
  const recent  = cards[0];

  if (recent) {
    if (recent.condom === false) tags.push({ label: '콘돔 미사용 (최근)', type: 'w' });
    (recent.positions || []).forEach(p => tags.push({ label: p, type: 'w' }));
    if (recent.date) tags.push({ label: recent.date + ' 관계', type: 'n' });
  }
  if (profile.chest)                   tags.push({ label: profile.chest + '컵', type: 'n' });
  if (profile.bodyHair === '없음')     tags.push({ label: '제모 완료', type: 'g' });
  if (recent && recent.mood)           tags.push({ label: recent.mood, type: 'n' });

  const wrap = document.getElementById('clinic-tags');
  if (tags.length === 0) {
    wrap.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">연동된 데이터 없음</span>';
    return;
  }
  wrap.innerHTML = tags.map(t => `<div class="dtag ${t.type}">${esc(t.label)}</div>`).join('');
}

function setQ(q) {
  document.getElementById('clinic-q').value = q;
}

async function clinicAsk() {
  const q = document.getElementById('clinic-q').value.trim();
  if (!q) return;
  if (!generate) { alert('ST와 연결되지 않았어요.'); return; }

  const btn = document.getElementById('clinic-ask-btn');
  btn.disabled = true;

  const answers = document.getElementById('clinic-answers');
  answers.innerHTML = `
    <div class="loading-card"><div class="sp"></div><span class="loading-text">산부인과 선생님 호출 중...</span></div>`;

  // 컨텍스트 구성
  syncStore();
  const tags    = document.getElementById('clinic-tags').innerText;
  const context = `User data context:\n${tags}\n\nQuestion: ${q}`;

  try {
    // 1차: 의사
    const docSystem = `You are a strict, caring OB/GYN doctor (산부인과 전문의).
Answer the user's sexual health question in Korean.
Be medically accurate, warn about risks, reference the provided user data context.
If condom is not used, always warn. Be direct and clinical.
Do NOT roleplay. 3~5 sentences.`;

    const docAnswer = await generate(docSystem, context);

    answers.innerHTML = `
      <div class="loading-card"><div class="sp"></div><span class="loading-text">${esc(charName)} 반응 기다리는 중...</span></div>`;

    // 2차: 캐릭터
    const charSystem = `You are ${charName}, a character in a romantic/sexual roleplay.
You just read the doctor's answer below. React in character — either brazenly argue back or sheepishly admit fault.
Be in-character, casual, a bit vulgar. Korean. 2~4 sentences.
Doctor's answer: ${docAnswer}`;

    const charAnswer = await generate(charSystem, `User asked: ${q}`);

    // 경고 감지
    const hasWarn = /콘돔|위험|감염|주의|경고|손상/.test(docAnswer);

    answers.innerHTML = `
      <div class="ans-card">
        <div class="ans-header">
          <div class="av doc">👩‍⚕️</div>
          <div>
            <div class="ans-name">산부인과 전문의</div>
            <div class="ans-sub">연동 데이터 기반 분석</div>
          </div>
        </div>
        <div class="ans-body">
          ${hasWarn ? '<div class="warn-tag">⚠️ 주의 필요</div><br>' : ''}
          <div class="ans-text">${esc(docAnswer)}</div>
        </div>
      </div>
      <div class="ans-card dark">
        <div class="ans-header">
          <div class="av ch">${esc(charName.charAt(0))}</div>
          <div>
            <div class="ans-name">${esc(charName)}의 한마디</div>
            <div class="ans-sub">방금 읽고 반응</div>
          </div>
        </div>
        <div class="ans-body">
          <div class="ans-text light">${esc(charAnswer)}</div>
        </div>
      </div>`;
  } catch(err) {
    console.error('[PC] clinicAsk error', err);
    answers.innerHTML = '<div style="font-size:12px;color:#c04030;padding:12px;">오류가 발생했어요. 다시 시도해주세요.</div>';
  }

  btn.disabled = false;
}

// ─────────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/\n/g,'<br>');
}
