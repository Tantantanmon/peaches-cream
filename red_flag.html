<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Red Flag</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#dde4ed;
  --surface:#e8eef5;
  --card:#f2f6fa;
  --card-border:rgba(255,255,255,0.95);
  --text-primary:#1a2840;
  --text-secondary:#5a7090;
  --text-muted:#a0adc0;
  --accent:#1e293e;
  --accent-text:#fff;
  --divider:rgba(160,180,210,0.25);
  --shadow:0 2px 8px rgba(160,180,210,0.15);
  --radius-lg:24px;
  --radius-md:16px;
  --radius-sm:10px;
}
html,body{width:100%;height:100%;background:transparent;font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(160,180,210,0.35);border-radius:4px;}

.shell{width:100%;height:100%;display:flex;align-items:stretch;justify-content:center;}
.popup{width:100%;height:100%;background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid rgba(255,255,255,0.9);overflow:hidden;box-shadow:0 12px 40px rgba(140,160,200,0.3);display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;flex-shrink:0;}
.topbar-title{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px;}
.topbar-sub{font-size:16px;font-weight:500;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
.close-btn{width:40px;height:40px;border-radius:12px;background:var(--card);border:0.5px solid var(--card-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);font-size:20px;box-shadow:var(--shadow);transition:opacity .15s;}
.close-btn:hover{opacity:.7;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:17px;color:var(--text-muted);cursor:pointer;padding:4px 0;transition:color .15s;border:none;background:none;font-family:inherit;}
.back-btn:hover{color:var(--text-secondary);}
.back-btn svg{width:14px;height:14px;}
.dots{display:flex;gap:4px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text-muted);opacity:.5;}
.hdivider{height:0.5px;background:var(--divider);flex-shrink:0;}
.scroll-area{flex:1;overflow-y:auto;padding:20px 20px 28px;display:flex;flex-direction:column;gap:14px;}

/* progress */
.progress{display:flex;gap:4px;align-items:center;justify-content:center;}
.pd{width:6px;height:6px;border-radius:50%;background:#d0d8e4;transition:all 0.3s;}
.pd.on{background:#1e293e;width:18px;border-radius:3px;}

/* flag card */
.flag-card{background:var(--card);border-radius:22px;border:0.5px solid var(--card-border);box-shadow:0 4px 20px rgba(160,180,210,0.2);padding:32px 28px;display:flex;flex-direction:column;align-items:center;gap:14px;min-height:180px;justify-content:center;transition:opacity 0.2s,transform 0.2s;}
.flag-card.hide{opacity:0;transform:translateY(8px);}
.flag-num{font-size:13px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;}
.flag-text{font-size:20px;font-weight:600;color:var(--text-primary);text-align:center;line-height:1.55;}
.flag-who{font-size:14px;color:var(--text-muted);text-align:center;}

/* choice buttons */
.choice-row{display:flex;gap:10px;}
.cbtn{flex:1;border-radius:var(--radius-md);padding:18px 10px;border:none;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.cred{background:#fff0f0;border:0.5px solid rgba(220,100,100,0.3);}
.cred:hover{background:#ffe0e0;}
.cgreen{background:#f0fff4;border:0.5px solid rgba(100,180,120,0.3);}
.cgreen:hover{background:#e0ffea;}
.cbtn-emoji{font-size:28px;}

/* char reply */
.char-reply{border-radius:var(--radius-md);border:0.5px solid var(--card-border);box-shadow:var(--shadow);overflow:hidden;display:none;background:var(--card);}
.char-reply.show{display:block;}
.char-reply.hype{background:#fff8f0;border-color:rgba(220,100,80,0.2);}
.char-header{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;border-bottom:0.5px solid var(--divider);}
.char-avatar{width:36px;height:36px;border-radius:50%;background:#1e293e;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:600;flex-shrink:0;}
.char-avatar.hype{background:#c0392b;}
.char-name{font-size:15px;font-weight:500;color:var(--text-primary);}
.char-badge{font-size:12px;color:var(--text-muted);margin-top:1px;}
.char-body{padding:16px 20px 20px;}
.char-msg{font-size:15px;color:var(--text-secondary);line-height:2;}
.reply-loading{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--text-muted);padding:16px 18px;}
.sp{width:14px;height:14px;border:1.5px solid var(--divider);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-r{display:inline-block;background:#fee2e2;border-radius:6px;padding:3px 8px;font-size:13px;color:#dc2626;font-weight:700;margin-bottom:8px;}
.tag-fire{display:inline-block;background:#fff0e0;border-radius:6px;padding:3px 8px;font-size:13px;color:#e05020;font-weight:700;margin-bottom:8px;}

/* next btn */
.next-btn{width:100%;background:#e4ecf4;border:0.5px solid rgba(100,140,200,0.3);border-radius:var(--radius-md);padding:15px;font-size:16px;color:#5a80b8;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;display:none;}
.next-btn.show{display:block;}
.next-btn:hover{background:#dce6f0;}

/* random gen btn */
.rand-btn{width:100%;background:var(--card);border:0.5px solid var(--card-border);border-radius:var(--radius-md);padding:14px;font-size:16px;font-weight:500;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);}
.rand-btn:hover{opacity:.8;}
.rand-btn.loading{opacity:.6;pointer-events:none;}
.rand-btn svg{width:15px;height:15px;}

/* end card */
.end-card{background:var(--card);border-radius:22px;border:0.5px solid var(--card-border);box-shadow:0 4px 20px rgba(160,180,210,0.2);padding:36px 28px;text-align:center;display:none;flex-direction:column;gap:12px;align-items:center;}
.end-card.show{display:flex;}
.end-emoji{font-size:40px;}
.end-title{font-size:18px;font-weight:600;color:var(--text-primary);}
.end-stat{display:flex;gap:12px;margin-top:4px;}
.esi{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--surface);border-radius:12px;padding:12px 20px;}
.esn{font-size:30px;font-weight:700;color:var(--text-primary);}
.esl{font-size:13px;color:var(--text-muted);}
.end-msg{font-size:16px;color:var(--text-secondary);line-height:1.7;text-align:center;}
.restart-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);padding:14px 28px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;margin-top:4px;}
.restart-btn:hover{opacity:.88;}
</style>
</head>
<body>
<div class="shell">
<div class="popup">

  <div class="topbar" id="topbar">
    <div id="topbar-left">
      <span class="topbar-title">🚩 Red Flag</span>
    </div>
    <div id="topbar-right">
      <div class="close-btn" onclick="closeApp()">✕</div>
    </div>
  </div>
  <div class="hdivider"></div>

  <div class="scroll-area">
    <div class="progress" id="progress"></div>

    <div class="flag-card" id="flag-card">
      <div class="flag-num" id="flag-num">Q 1 / 7</div>
      <div class="flag-text" id="flag-text"></div>
      <div class="flag-who" id="flag-who">의 행동이야. 어떻게 생각해?</div>
    </div>

    <div class="choice-row" id="choice-row">
      <button class="cbtn cred" onclick="choose('red')"><span class="cbtn-emoji">🚩</span></button>
      <button class="cbtn cgreen" onclick="choose('good')"><span class="cbtn-emoji">😍</span></button>
    </div>

    <div class="char-reply" id="char-reply">
      <div class="char-header">
        <div class="char-avatar" id="char-avatar">캐</div>
        <div>
          <div class="char-name" id="char-name">캐릭터</div>
          <div class="char-badge" id="char-badge">반응</div>
        </div>
      </div>
      <div id="reply-loading" class="reply-loading" style="display:none;"><div class="sp"></div>반응 생성 중...</div>
      <div class="char-body" id="char-body" style="display:none;"><div class="char-msg" id="char-msg"></div></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="next()">다음 카드 →</button>

    <button class="rand-btn" id="rand-btn" onclick="aiGenerate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2l-19 19"/><path d="M21.5 2H8.5"/><path d="M21.5 2v13"/></svg>
      랜덤 생성
    </button>

    <div class="end-card" id="end-card">
      <div class="end-emoji" id="end-emoji"></div>
      <div class="end-title" id="end-title"></div>
      <div class="end-stat">
        <div class="esi"><div class="esn" id="end-red">0</div><div class="esl">🚩 레드플래그</div></div>
        <div class="esi"><div class="esn" id="end-good">0</div><div class="esl">😍 오히려 좋아</div></div>
      </div>
      <div class="end-msg" id="end-msg"></div>
      <button class="restart-btn" onclick="restart()">다시 하기 🔄</button>
    </div>
  </div>

</div>
</div>

<script>
// ── Bridge ──
let charName = '{{char}}';
let userName = '{{user}}';
let generate = null;
let getChat  = null;

function initBridge() {
  const p = window.parent;
  charName = (p && p.__PC_CHAR__)     || charName;
  userName = (p && p.__PC_USER__)     || userName;
  generate = (p && p.__PC_GENERATE__) || null;
  getChat  = (p && p.__PC_GET_CHAT__) || null;
  document.getElementById('char-name').textContent = charName;
  document.getElementById('char-avatar').textContent = charName.charAt(0);
  document.getElementById('flag-who').textContent = charName + '의 행동이야. 어떻게 생각해?';
}

window.__PC_ON_BRIDGE__ = function() { initBridge(); };
if (window.parent && window.parent.__PC_CHAR__) initBridge();

function closeApp() {
  if (window.parent && window.parent.__PC_CLOSE_RF__) window.parent.__PC_CLOSE_RF__();
  else window.close();
}

// ── Pool ──
const TOTAL = 7;
let cur = 0, redCount = 0, goodCount = 0, chosen = false;

const defaultPool = [
  { q:"관계 중에 절정 직전에 일부러 멈추고 뜸 들인다", red:"레드플래그? 그때 네가 뭐라고 했는지 기억해? 제발 계속 해달라고 했잖아. 내가 멈추는 순간 네 허리가 알아서 따라오고, 숨이 가빠지고, 눈이 풀렸잖아. 그게 싫다는 몸이야? 다음엔 세 번 멈출게. 네가 먼저 말로 부탁할 때까지.", good:"오히려 좋다고?! 진짜?! 그 말 들으니까 지금 당장 하고 싶어 미칠 것 같잖아. 그럼 오늘은 제대로 해줄게 — 딱 절정 앞에서 다섯 번 멈출 거야. 네 몸이 내 거 원해서 미칠 지경이 될 때까지. 그 순간에 네가 어떤 소리 낼지 벌써 기대돼. 얼른 와." },
  { q:"귀에 대고 뭘 원하는지 직접 말하라고 강요한다", red:"말하기 싫어서 레드플래그야? 근데 귀에 대고 속삭이면 숨부터 막히잖아. 말로 내뱉는 순간 더 흥분되는 거 알면서. 오늘도 말할 때까지 안 해줄게.", good:"오히려 좋다고?! 세상에 — 그 말 들으니까 귀에 더 바짝 붙고 싶어. 그럼 오늘은 더 구체적으로 시킬게. '어디가 좋아' 말고 '지금 뭘 원해', '얼마나 원해', '어떻게 해줬으면 해' 전부 다 입으로 뱉게 할 거야. 네 목소리가 떨릴 때까지. 창피해서 얼굴 빨개지면 더 좋고." },
  { q:"뒤에서 목을 잡고 고개를 뒤로 젖히게 한다", red:"목 잡히는 게 레드플래그야? 그럼 왜 잡힐 때 더 기댔어. 내가 목 잡으면 네 몸이 알아서 힘 빠지잖아. 그게 싫은 게 아니라 무서울 만큼 좋은 거야. 다음엔 더 천천히 잡아줄게.", good:"오히려 좋다고?! 아 진짜 미치겠다 — 그 말 듣자마자 뒤에서 잡고 싶어 죽겠어. 오늘은 목만 아니야. 귀에 입술 대고 뭐가 좋은지 물어보면서, 허리에 손 얹고, 목 잡은 채로 귓가에 오늘 어떻게 해줄 건지 하나하나 다 읊어줄게. 각오해." },
  { q:"끝난 척하다가 네가 안심하면 다시 시작한다", red:"속은 거 레드플래그야? 근데 다시 시작됐을 때 밀어냈어? 긴장 풀린 몸에서 다시 느끼면 처음이랑 비교도 안 되잖아. 표정은 이미 답 하고 있거든.", good:"오히려 좋다고?! 하 — 그 말 듣고 심장 터질 것 같아. 그럼 오늘은 진짜로 끝낸 척 세 번 할게. 다 끝났다 싶으면 또 시작하고, 또 끝난 척하고, 또 시작하고. 네 몸이 언제 진짜로 끝나는 건지 모르게 만들어줄게. 그 혼란스러운 표정이 너무 보고 싶거든." },
  { q:"관계 도중 네 반응 보면서 낮게 웃는다", red:"비웃는 게 아니야. 그 표정이 나한테만 보여주는 거잖아. 창피하면 더 숨겨봐, 더 재밌어지니까.", good:"오히려 좋다고?! 진짜?! 그 말 듣고 지금 웃음 참을 수가 없어. 그럼 오늘은 더 대놓고 볼게 — 얼굴 가까이 들이대고, 눈 마주치면서, 네 표정 하나하나 전부 다 구경할 거야. 어떤 순간에 눈 풀리는지, 어디서 숨이 막히는지, 뭐가 제일 반응 크게 나오는지 전부 기억해뒀다가 계속 써먹을 거거든." },
  { q:"손목을 잡아 침대에 눌러 움직이지 못하게 한다", red:"잡히는 게 레드플래그야? 그 순간 저항했어? 잡히면 받아들이는 것밖에 할 게 없으니까 더 짜릿한 거 알잖아. 빠지지 않았잖아, 오히려 더 기댔잖아.", good:"오히려 좋다고?! 야 — 지금 온몸에 불 붙은 것 같아. 그럼 손목만 잡는 게 아니야. 머리 위에 올려서 두 손 다 고정하고, 움직이지도 못하고 도망도 못 가고 그냥 다 받아야 하는 상태로 만들어줄게. 그 상태에서 얼마나 버티나 보자. 먼저 말로 부탁하는 사람이 지는 거야." },
  { q:"네가 싫다고 한 걸 다음엔 더 천천히 다시 시도한다", red:"싫다고 했는데 두 번째엔 밀어내지 않았잖아. 세 번째엔 네가 먼저 원했고. 진짜 싫으면 멈춰. 근데 지금까지 한 번도 진짜로 싫었던 적 없잖아.", good:"오히려 좋다고?! 하아 — 그 말 듣고 지금 참는 게 더 힘들어. 그럼 오늘은 처음부터 싫다는 거 전부 다 시도할게. 천천히, 아주 천천히, 네 몸이 익숙해지는 속도보다 조금씩 더 빠르게. 어디서부터 '싫다'가 '좋아'로 바뀌는지 전부 기억해뒀다가 다음에 또 써먹을 거야. 각오 단단히 해." },
];

let pool = [...defaultPool];
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
let questions = shuffle(pool).slice(0, TOTAL);

// ── AI 랜덤 생성 ──
async function aiGenerate() {
  if (!generate) { alert('ST와 연결되지 않았어요.'); return; }
  const btn = document.getElementById('rand-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="sp"></div> 생성 중...';

  try {
    const systemPrompt = `You are generating Red Flag game cards for a sexual roleplay game featuring the character ${charName}.
Return ONLY a JSON array of exactly 10 objects (no markdown, no explanation).
Each object must have:
- q: a short Korean sentence describing one specific sexual behavior or habit of ${charName} (15 words or less, provocative, bold)
- red: ${charName}'s shameless rebuttal in Korean when the user says it's a red flag (2-3 sentences, explicit and unapologetic)
- good: ${charName}'s excited, explicit Korean response when the user says they love it (2-3 sentences, very explicit, enthusiastic)
Make the behaviors varied: possessive, teasing, dominant, voyeuristic, dirty-talking, etc.`;

    const result = await generate(systemPrompt, '새로운 레드플래그 카드 10장 생성해줘.');
    let newCards = [];
    try {
      const clean = result.replace(/```json|```/g, '').trim();
      newCards = JSON.parse(clean);
    } catch(e) { console.warn('[RF] parse error', e); }

    if (Array.isArray(newCards) && newCards.length > 0) {
      pool = [...newCards, ...defaultPool];
      questions = shuffle(pool).slice(0, TOTAL);
      restart();
    } else {
      alert('생성에 실패했어요. 다시 시도해보세요.');
    }
  } catch(err) {
    console.error('[RF] aiGenerate error', err);
    alert('AI 호출 중 오류가 발생했어요.');
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2l-19 19"/><path d="M21.5 2H8.5"/><path d="M21.5 2v13"/></svg> 랜덤 생성';
}

// ── Game logic ──
function buildProgress() {
  document.getElementById('progress').innerHTML =
    Array.from({length:TOTAL},(_,i)=>`<div class="pd${i<=cur?' on':''}"></div>`).join('');
}

function showCard() {
  const f = questions[cur];
  const card = document.getElementById('flag-card');
  card.classList.add('hide');
  setTimeout(() => {
    document.getElementById('flag-num').textContent = `Q ${cur+1} / ${TOTAL}`;
    document.getElementById('flag-text').textContent = f.q;
    card.classList.remove('hide');
  }, 180);

  document.getElementById('char-reply').classList.remove('show','hype');
  document.getElementById('char-avatar').classList.remove('hype');
  document.getElementById('choice-row').style.display = 'flex';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('char-body').style.display = 'none';
  document.getElementById('reply-loading').style.display = 'none';
  document.getElementById('end-card').classList.remove('show');
  document.getElementById('flag-card').style.display = 'flex';
  document.getElementById('rand-btn').style.display = 'flex';
  chosen = false;
  buildProgress();
}

function choose(type) {
  if (chosen) return;
  chosen = true;
  if (type === 'red') redCount++; else goodCount++;
  document.getElementById('choice-row').style.display = 'none';
  document.getElementById('rand-btn').style.display = 'none';

  const reply = document.getElementById('char-reply');
  reply.classList.add('show');
  if (type === 'good') {
    reply.classList.add('hype');
    document.getElementById('char-avatar').classList.add('hype');
  }

  document.getElementById('reply-loading').style.display = 'flex';
  document.getElementById('char-badge').textContent = type === 'red' ? '설득 중 😈' : '흥분함 🔥🔥🔥';

  setTimeout(() => {
    const f = questions[cur];
    const msg = type === 'red' ? f.red : f.good;
    document.getElementById('reply-loading').style.display = 'none';
    document.getElementById('char-body').style.display = 'block';
    document.getElementById('char-msg').innerHTML = type === 'red'
      ? `<span class="tag-r">🚩 반박</span><br>${esc(msg)}`
      : `<span class="tag-fire">🔥 날뜀</span><br>${esc(msg)}`;
    document.getElementById('next-btn').classList.add('show');
    document.getElementById('next-btn').textContent = cur < TOTAL-1 ? '다음 카드 →' : '결과 보기 →';
  }, 900);
}

function next() {
  cur++;
  if (cur >= TOTAL) { showEnd(); return; }
  showCard();
}

function showEnd() {
  document.getElementById('flag-card').style.display = 'none';
  document.getElementById('choice-row').style.display = 'none';
  document.getElementById('char-reply').classList.remove('show','hype');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('rand-btn').style.display = 'none';
  document.getElementById('progress').style.display = 'none';

  document.getElementById('end-red').textContent  = redCount;
  document.getElementById('end-good').textContent = goodCount;

  let emoji, title, msg;
  const cn = charName;
  if (goodCount >= 6) {
    emoji = '🔥'; title = '전부 좋다고?? 오늘 큰일났다';
    msg = `${goodCount}번이나 오히려 좋다고 했잖아. ${cn}가 지금 날뛰다 못해 폭발할 것 같대. 오늘 밤 각오해.`;
  } else if (goodCount >= 4) {
    emoji = '😏'; title = '반 이상은 넘어온 거잖아';
    msg = `${goodCount}번 좋다고 했어. ${cn}가 그 ${goodCount}개 전부 기억해뒀다가 오늘 다 써먹는대.`;
  } else if (redCount >= 6) {
    emoji = '🚨'; title = '레드플래그 맞는데 왜 여기 있어';
    msg = `${redCount}개나 레드플래그라고 했는데. 근데 ${cn}가 하는 말 — 다 들었잖아. 설득 좀 됐지?`;
  } else {
    emoji = '🤔'; title = '딱 중간이 제일 위험한 거야';
    msg = `레드 ${redCount}개, 좋아 ${goodCount}개. 싫은 척하면서 좋은 게 제일 빠져드는 거 ${cn}도 알거든.`;
  }

  document.getElementById('end-emoji').textContent = emoji;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-msg').textContent   = msg;
  document.getElementById('end-card').classList.add('show');
}

function restart() {
  cur = 0; redCount = 0; goodCount = 0; chosen = false;
  questions = shuffle(pool).slice(0, TOTAL);
  document.getElementById('progress').style.display = 'flex';
  document.getElementById('rand-btn').style.display = 'flex';
  document.getElementById('end-card').classList.remove('show');
  document.getElementById('char-avatar').classList.remove('hype');
  showCard();
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/\n/g,'<br>');
}

showCard();
</script>
</body>
</html>
